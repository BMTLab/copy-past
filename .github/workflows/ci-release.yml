# .github/workflows/ci-release.yml
#
# On a `v*.*.*` tag push,
# builds a tarball via `git archive`,
# generates a SHA-256 checksum,
# and creates a GitHub Release.
#
# `git archive` respects the `export-ignore` attributes
# from .gitattributes,
# so dev-only files like tests/, .github/, .editorconfig
# are excluded automatically.

name: Release CI

on:
  workflow_call:
    inputs:
      version:
        description: 'Tag name being released (e.g. v1.2.0)'
        required: true
        type: string

jobs:
  release:
    name: Release ${{ inputs.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      # Required by actions/attest-build-provenance@v4
      # to sign the SLSA attestation through GitHub's OIDC issuer.
      id-token: write
      attestations: write

    env:
      ARCHIVE_NAME: copy-past-${{ inputs.version }}
      ### Exit codes
      ERR_VERSION_MISMATCH: 21
      ERR_ARCHIVE_FAILED: 22

    steps:
      - name: ⚙️ Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          # The release job only reads from git
          # (we use `git archive`, not `git push`),
          # so the persisted token is not needed.
          # softprops/action-gh-release@v3 uses its own `token` input
          # (defaulted to github.token) to call the Releases API.
          persist-credentials: false

      # Sanity check:
      # the version in copy.sh / past.sh must match the tag.
      # We don't want to ship `v1.2.0`
      # with `# Version: 1.1.0` in the headers;
      # that would be confusing
      # to anyone reading the file after install.
      - name: 🔒 Verify version headers match the tag
        env:
          TAG: ${{ inputs.version }}
        run: |
          set -o errexit -o nounset -o pipefail

          #######################################
          # Print an annotated error to stderr
          # and return the given code.
          #
          # Arguments:
          #   1: error message.
          #   2: exit code (defaults to ERR_VERSION_MISMATCH).
          #######################################
          function release_error() {
            local -r message="$1"
            local -ir code="${2:-$ERR_VERSION_MISMATCH}"

            echo "::error title=Version mismatch::$message" >&2
            return "$code"
          }

          #######################################
          # Strip the leading 'v' from a semver-style tag.
          #
          # Arguments:
          #   1: tag name (e.g. 'v1.2.0').
          # Outputs:
          #   The version string ('1.2.0') on stdout.
          #######################################
          function strip_v_prefix() {
            local -r tag="$1"
            printf '%s' "${tag#v}"
          }

          #######################################
          # Read the `# Version:` line from a script header.
          #
          # Arguments:
          #   1: path to the script file.
          # Outputs:
          #   The version string on stdout,
          #   or empty string on no match.
          #######################################
          function header_version() {
            local -r file="$1"

            grep -oE '^# Version:[[:space:]]*[0-9.]+' "$file" \
              | head -n1 \
              | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' \
              || true
          }

          #######################################
          # Verify that every script's header version
          # matches the expected value.
          #
          # Arguments:
          #   1:    expected version string ('1.2.0').
          #   2..N: script paths to check.
          # Returns:
          #   0 on full match,
          #   ERR_VERSION_MISMATCH otherwise.
          #######################################
          function verify_headers() {
            local -r expected="$1"
            shift

            local file
            local actual
            local -a mismatched=()

            for file in "$@"; do
              actual="$(header_version "$file")"
              if [[ "$actual" != "$expected" ]]; then
                mismatched+=("$file (header=${actual:-<none>}, tag=$expected)")
              fi
            done

            if (( ${#mismatched[@]} > 0 )); then
              local entry
              for entry in "${mismatched[@]}"; do
                echo "::error title=Version mismatch::$entry" >&2
              done
              return "$ERR_VERSION_MISMATCH"
            fi
          }

          #######################################
          # Entrypoint.
          #
          # Globals:
          #   TAG (read).
          #######################################
          function main() {
            local expected
            expected="$(strip_v_prefix "$TAG")"

            if ! verify_headers "$expected" copy.sh past.sh; then
              release_error \
                "Tag $TAG does not match script headers" \
                || return "$?"
            fi

            echo "::notice title=Versions::All script headers match $expected"
          }

          main "$@"

      # `git archive` honours `export-ignore` attributes,
      # so the resulting tarball contains
      # only the files that downstream users actually need
      # (scripts, README, LICENSE, Makefile).
      # Everything dev-only is filtered out automatically.
      - name: 📦 Build release tarball
        env:
          TAG: ${{ inputs.version }}
        run: |
          set -o errexit -o nounset -o pipefail

          #######################################
          # Print an annotated error to stderr
          # and return the given code.
          #######################################
          function release_error() {
            local -r message="$1"
            local -ir code="${2:-$ERR_ARCHIVE_FAILED}"

            echo "::error title=Archive build::$message" >&2
            return "$code"
          }

          #######################################
          # Build a reproducible source tarball from a git tag.
          #
          # Arguments:
          #   1: tag name (e.g. 'v1.2.0').
          #   2: archive prefix
          #      (top-level directory inside the tarball).
          #   3: output file path.
          # Returns:
          #   Non-zero if `git archive` fails.
          #######################################
          function build_tarball() {
            local -r tag="$1"
            local -r prefix="$2"
            local -r output="$3"

            if ! git archive \
              --format=tar.gz \
              --prefix="${prefix}/" \
              --output="$output" \
              "$tag"; then
              release_error "git archive $tag failed" \
                || return "$?"
            fi
          }

          #######################################
          # Compute SHA-256 of a file
          # and write it to <file>.sha256.
          #
          # Arguments:
          #   1: path to the file to hash.
          #######################################
          function write_sha256() {
            local -r path="$1"
            sha256sum "$path" > "${path}.sha256"
          }

          #######################################
          # Print the first 40 entries of the archive,
          # plus a total count,
          # inside a folded log group.
          # Useful for spotting missing files in PR review.
          #######################################
          function preview_archive() {
            local -r path="$1"

            echo '::group::Archive contents'
            tar -tzf "$path" | head -n40
            echo '...'
            tar -tzf "$path" | wc -l
            echo '::endgroup::'
          }

          #######################################
          # Entrypoint.
          #
          # Globals:
          #   ARCHIVE_NAME, TAG (read).
          #######################################
          function main() {
            local -r archive="${ARCHIVE_NAME}.tar.gz"

            build_tarball "$TAG" "$ARCHIVE_NAME" "$archive"
            write_sha256 "$archive"
            preview_archive "$archive"
          }

          main "$@"

      - name: 🛳️ Create GitHub Release
        id: create-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          # When release-please is in charge of versioning,
          # the GitHub Release for this tag already exists
          # and carries a hand-curated body taken from CHANGELOG.md.
          # softprops/action-gh-release@v3 will reuse that release
          # and only attach the new files;
          # we therefore do NOT generate notes here,
          # so that we never overwrite the changelog body.
          #
          # If you adopt this workflow without release-please,
          # set `generate_release_notes: true` to fall back to
          # GitHub's auto-generated notes.
          generate_release_notes: false
          append_body: false
          # Release the tarball before the .sha256,
          # so the checksum entry on the release page
          # appears next to (and below) the file it verifies.
          preserve_order: true
          # Mark the freshly published version as the latest release
          # in the GitHub UI; pre-release dispatches go through a
          # different workflow and never hit this step.
          make_latest: 'true'
          files: |
            ${{ env.ARCHIVE_NAME }}.tar.gz
            ${{ env.ARCHIVE_NAME }}.tar.gz.sha256
          fail_on_unmatched_files: true

      # Build provenance creates a sigstore-signed SLSA attestation
      # tied to the workflow that produced the tarball.
      # Consumers can verify authenticity via the GitHub CLI:
      #   gh attestation verify copy-past-vX.Y.Z.tar.gz \
      #     --repo BMTLab/copy-past
      #
      # We pass `subject-checksums` so the attestation references
      # the .sha256 file we already produced;
      # the action then attests every file listed there.
      - name: 🔏 Generate SLSA build provenance
        id: provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-checksums: ${{ env.ARCHIVE_NAME }}.tar.gz.sha256

      - name: 📊 Summary
        if: ${{ always() }}
        env:
          RELEASE_URL: ${{ steps.create-release.outputs.url }}
          ATTESTATION_URL: ${{ steps.provenance.outputs.attestation-url }}
        run: |
          set -o errexit -o nounset -o pipefail

          #######################################
          # Read the SHA-256 hash
          # from a `sha256sum`-style file.
          #
          # The file format is "HASH  filename" on one line;
          # we use bash's `read` to split on whitespace
          # without spawning awk.
          #
          # Arguments:
          #   1: path to the .sha256 file.
          # Outputs:
          #   The hash on stdout.
          #######################################
          function read_sha256_hash() {
            local -r path="$1"
            local hash _filename
            read -r hash _filename < "$path"
            printf '%s' "$hash"
          }

          #######################################
          # Append a single Markdown table row
          # describing the produced archive.
          #
          # Arguments:
          #   1: archive file path.
          #######################################
          function append_archive_row() {
            local -r archive="$1"

            local size hash
            size="$(du -h "$archive" | cut -f1)"
            hash="$(read_sha256_hash "${archive}.sha256")"

            # `tick` carries a literal backtick.
            # Pre-building the row in shell variables
            # sidesteps shellcheck SC2016 false positives
            # that would fire on `printf '`%s`'`.
            local -r tick='`'
            echo "| ${tick}${archive}${tick} | ${size} | ${tick}${hash}${tick} |" \
              >> "$GITHUB_STEP_SUMMARY"
          }

          #######################################
          # Append the GitHub Release page link to the summary,
          # using the `url` output published by
          # softprops/action-gh-release@v3.
          # The block is skipped when the release step did not run
          # (e.g. when the workflow was triggered manually
          # for a dry-run).
          #
          # Globals:
          #   RELEASE_URL, GITHUB_STEP_SUMMARY (read).
          #######################################
          function append_release_link() {
            if [[ -z "${RELEASE_URL:-}" ]]; then
              return 0
            fi

            {
              echo
              echo "🔗 [Release page](${RELEASE_URL})"
            } >> "$GITHUB_STEP_SUMMARY"
          }

          #######################################
          # Append the SLSA attestation block to the summary,
          # using the `attestation-url` output published by
          # actions/attest-build-provenance@v4.
          # Includes the verification command for downstream users
          # so the link is actionable, not just decorative.
          #
          # Globals:
          #   ATTESTATION_URL, ARCHIVE_NAME,
          #   GITHUB_REPOSITORY, GITHUB_STEP_SUMMARY (read).
          #######################################
          function append_attestation_block() {
            if [[ -z "${ATTESTATION_URL:-}" ]]; then
              return 0
            fi

            {
              echo
              echo '<details><summary>🔏 Build provenance (SLSA)</summary>'
              echo
              echo "- Attestation: ${ATTESTATION_URL}"
              echo
              echo 'Verify locally with the GitHub CLI:'
              echo
              echo '```bash'
              echo "gh attestation verify ${ARCHIVE_NAME}.tar.gz \\"
              echo "  --repo ${GITHUB_REPOSITORY}"
              echo '```'
              echo
              echo '</details>'
            } >> "$GITHUB_STEP_SUMMARY"
          }

          #######################################
          # Entrypoint.
          #
          # Globals:
          #   ARCHIVE_NAME, GITHUB_STEP_SUMMARY (read).
          #######################################
          function main() {
            local -r archive="${ARCHIVE_NAME}.tar.gz"

            {
              echo '## 🛳️ Release'
              echo
            } >> "$GITHUB_STEP_SUMMARY"

            if [[ ! -f "$archive" ]]; then
              echo '⚠️ archive not built' >> "$GITHUB_STEP_SUMMARY"
              return 0
            fi

            {
              echo '| File | Size | SHA-256 |'
              echo '|------|------|---------|'
            } >> "$GITHUB_STEP_SUMMARY"

            append_archive_row "$archive"
            append_release_link
            append_attestation_block
          }

          main "$@"
