# .github/workflows/ci-release-please.yml
#
# release-please automates the release-engineering loop:
#
#   1. On every push to `main`,
#      it parses conventional commits (feat: / fix: / chore: ...)
#      since the previous tag.
#   2. If those commits warrant a new version,
#      it opens or updates a release-PR
#      with an updated CHANGELOG.md
#      and bumped Version markers in copy.sh / past.sh / Makefile
#      (see `extra-files` in release-please-config.json).
#   3. When that PR is merged,
#      release-please creates the matching `vX.Y.Z` git tag.
#   4. The tag push then triggers ci-main.yml,
#      which runs lint + tests
#      and ultimately builds and signs the release tarball.
#
# This workflow does not need to talk to ci-main.yml directly:
# the `vX.Y.Z` tag is the contract between the two pipelines.
#
# ────────────────────────────────────────────────────────────────
# REPO SETUP CHECKLIST (one-time, in the GitHub UI)
# ────────────────────────────────────────────────────────────────
#
#   Settings → Actions → General → Workflow permissions:
#     ☑ "Allow GitHub Actions to create and approve pull requests"
#       (without this flag, `pull-requests: write` in the YAML
#       is not enough — the action will fail with
#       "GitHub Actions is not permitted to create…").
#
#   Settings → Secrets and variables → Actions:
#     • Add `RELEASE_PLEASE_TOKEN` (recommended).
#       It can be either:
#         - a fine-grained PAT
#           with `Contents: write` + `Pull requests: write`
#           on this repository, or
#         - a GitHub App installation token
#           with the same permissions.
#       Without this secret the action falls back to GITHUB_TOKEN,
#       which CAN open the PR and create the tag,
#       but the tag push WILL NOT trigger ci-main.yml
#       (GitHub blocks recursion for default-token tags).
#       In that case the release tarball must be built manually
#       via workflow_dispatch on ci-main.yml.
#
# ────────────────────────────────────────────────────────────────
# Conventional Commits cheat-sheet
# ────────────────────────────────────────────────────────────────
#   feat:     -> minor bump
#   fix:      -> patch bump
#   feat!:    -> major bump (breaking change)
#   chore:    -> no bump (skipped from changelog)
#   docs:     -> no bump
#   refactor: -> no bump
#   test:     -> no bump

name: Release Please CI

on:
  push:
    branches:
      - main

# Default permissions are read-only;
# the release-please job overrides them with the minimum needed
# to open PRs and create tags on its behalf.
permissions:
  contents: read

jobs:
  release-please:
    name: 🤖 Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 🤖 Run release-please
        uses: googleapis/release-please-action@v4
        with:
          # The config and manifest paths are the v4 defaults;
          # we set them explicitly so a future move of the files
          # does not silently break the pipeline.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # IMPORTANT:
          # the default `secrets.GITHUB_TOKEN` is enough to open
          # release PRs and create tags,
          # but tags created with that token DO NOT trigger
          # downstream workflows
          # (GitHub blocks this to prevent recursive runs).
          #
          # As a result, ci-main.yml would not run on the new tag
          # and the release tarball would never be built.
          #
          # The fix is to pass a token whose creator counts as
          # "an actor" for trigger purposes:
          #   - a Personal Access Token with `repo` scope, or
          #   - a GitHub App installation token (preferred).
          #
          # The token is read from the optional `RELEASE_PLEASE_TOKEN`
          # secret; we fall back to the default token so the action
          # still functions for repos that have not configured one
          # (release PRs and tags are created, but the tarball job
          # has to be triggered manually via workflow_dispatch).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
